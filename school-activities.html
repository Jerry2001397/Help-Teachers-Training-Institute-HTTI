<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTI - School Activities</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="side-menu" id="sideMenu">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="admin.html">Admin</a>
      <a href="staffs.html">Staffs</a>
      <a href="contact.html">Contact</a>
      <a href="courses-offered.html">Courses Offered</a>
      <a href="school-activities.html">School Activities</a>
    </nav>
    <header class="header">
      <button class="menu-btn" aria-label="Open menu" id="menuBtn">
        <span class="menu-icon"></span>
      </button>
      <h1>School Activities</h1>
      <img src="help-logo.png" alt="HTTI Logo" class="logo logo-topright" />
    </header>
    <main>
      <section>
        <h2>Our Activities</h2>
        <p>Details about school activities will be listed here.</p>
      </section>
    </main>
  </div>
  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sideMenu = document.getElementById('sideMenu');
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      sideMenu.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (sideMenu.classList.contains('open')) {
        if (!sideMenu.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
          sideMenu.classList.remove('open');
        }
      }
    });
  </script>
</body>
</html>
